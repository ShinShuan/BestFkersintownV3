---
checkout: true
---
{{#partial "page"}}

<style>
.bfit-checkout-wrap {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 24px;
    font-family: 'Outfit', sans-serif;
}
.bfit-checkout-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid #e8e8e8;
}
.bfit-checkout-logo-icon {
    width: 38px;
    height: 38px;
    background: #d13296;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 13px;
    font-weight: 800;
}
.bfit-checkout-logo-text {
    font-size: 18px;
    font-weight: 700;
    color: #1a1a1a;
}
.bfit-checkout-logo-text span { color: #d13296; font-style: italic; }
#checkout-app { min-height: 400px; }
</style>

<div class="bfit-checkout-wrap">
    <div class="bfit-checkout-header">
        <div class="bfit-checkout-logo-icon">BFT</div>
        <div class="bfit-checkout-logo-text">BestF.kers<span>in</span>Town — Checkout</div>
    </div>
    <main id="checkout-app" role="main"></main>
</div>

{{/partial}}
{{> layout/base}}
