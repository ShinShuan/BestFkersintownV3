{{#partial "page"}}

<div class="bfit-auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">BestF.kersInTown</div>
            <p>{{lang 'forgot_password.subtitle'}}</p>
        </div>
        <div class="auth-body">
            {{#if error_messages}}
            <div class="form-error">{{error_messages}}</div>
            {{/if}}
            {{#if sent}}
            <div style="text-align:center;padding:16px 0;color:#10b981">
                {{lang 'forgot_password.sent'}}
            </div>
            {{else}}
            <form action="{{urls.auth.forgot_password}}" method="POST">
                <input type="hidden" name="action" value="forgot_password">
                <div class="form-group">
                    <label for="email">{{lang 'forgot_password.email'}}</label>
                    <input type="email" id="email" name="email" autocomplete="email" required>
                </div>
                <button type="submit" class="auth-btn">{{lang 'forgot_password.submit'}}</button>
            </form>
            {{/if}}

            <div class="auth-links">
                <p><a href="{{urls.auth.login}}">{{lang 'forgot_password.back_to_login'}}</a></p>
            </div>
        </div>
    </div>
</div>

{{/partial}}
{{> layout/base}}
